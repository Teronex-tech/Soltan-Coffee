<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الحجوزات | سلطان البن</title>
<link rel="preconnect" href="https://raw.githubusercontent.com" crossorigin>
<link rel="icon" href="https://raw.githubusercontent.com/Teronex-tech/Soltan-Coffee/main/logo.jpg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@300;400;500;700;900&display=swap');

:root{
  --void:        #170f09;
  --espresso:    #241809;
  --espresso-2:  #2c1d0e;
  --card:        #291a0c;
  --gold:        #d9ac54;
  --gold-bright: #ffe1a0;
  --gold-dim:    #a9834a;
  --bronze-line: rgba(217,172,84,0.4);
  --ivory:       #fbf3e3;
  --parchment:   #d3c4a5;
  --parchment-dim: #a9987e;
}
*,*::before,*::after{ box-sizing:border-box; }
html, body { margin:0; padding:0; height:100%; }
body{
  background:var(--void); color:var(--parchment); font-family:'Tajawal',sans-serif;
  direction:rtl; min-height:100vh; display:flex; flex-direction:column;
}
a{ color:inherit; }
h1,h2,h3{ font-family:'Aref Ruqaa',serif; color:var(--ivory); margin:0; }
.container{ max-width:1300px; margin:0 auto; padding:0 24px; width:100%; }

.page-wrapper{ display:flex; flex-direction:column; min-height:100vh; flex:1; }

/* login screen */
.login-wrap{ flex:1; min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:22px; }
.login-box{ background:var(--card); border:1px solid var(--bronze-line); border-radius:8px; padding:36px; width:100%; max-width:360px; }
.login-box h2{ text-align:center; margin-bottom:22px; font-size:24px; }
.login-box input{
  width:100%; padding:13px 14px; margin-bottom:14px; background:var(--espresso-2); border:1px solid var(--bronze-line);
  border-radius:6px; color:var(--ivory); font-family:'Tajawal',sans-serif; font-size:14.5px; outline:none;
}
.login-box input:focus{ border-color:var(--gold); }
.login-box button{
  width:100%; padding:14px; border-radius:999px; border:none; cursor:pointer; font-weight:700; font-size:15px;
  background:linear-gradient(135deg,var(--gold-bright),var(--gold) 55%, var(--gold-dim)); color:#1c1206;
}
.login-error{ color:#e07a6b; font-size:13px; text-align:center; margin-top:8px; display:none; }

/* dashboard */
#dashWrap{ flex:1; display:flex; flex-direction:column; }
.dash-header{
  padding:22px 0; border-bottom:1px solid var(--bronze-line); display:flex; justify-content:space-between;
  align-items:center; flex-wrap:wrap; gap:12px; flex-shrink:0;
}
.dash-header .brand{ font-family:'Aref Ruqaa',serif; font-size:22px; color:var(--ivory); }
.dash-actions{ display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
.dash-actions button, .dash-actions a{
  padding:10px 20px; border-radius:999px; border:1px solid var(--gold-dim); background:transparent; color:var(--gold-bright);
  cursor:pointer; font-family:'Tajawal',sans-serif; font-size:13.5px; font-weight:700; text-decoration:none;
}
.dash-actions button:hover, .dash-actions a:hover{ background:rgba(217,172,84,.1); }

.dash-body{ padding:30px 0 40px; flex:1; }

.stats-row{ display:flex; gap:16px; margin-bottom:24px; flex-wrap:wrap; }
.stat-card{ background:var(--card); border:1px solid var(--bronze-line); border-radius:8px; padding:16px 22px; min-width:140px; }
.stat-card .num{ font-family:'Aref Ruqaa',serif; font-size:24px; color:var(--gold-bright); }
.stat-card .label{ font-size:12px; color:var(--parchment-dim); }

/* toolbar: search + status filters */
.toolbar{ display:flex; flex-wrap:wrap; gap:14px; align-items:center; margin-bottom:16px; }
.search-box{
  flex:1; min-width:220px; display:flex; align-items:center; gap:10px; background:var(--card);
  border:1px solid var(--bronze-line); border-radius:8px; padding:10px 16px;
}
.search-box input{
  flex:1; background:transparent; border:none; outline:none; color:var(--ivory); font-family:'Tajawal',sans-serif; font-size:14px;
}
.search-box input::placeholder{ color:var(--parchment-dim); }

.count-hint{ font-size:12.5px; color:var(--parchment-dim); margin-bottom:16px; }

/* status badges */
.empty-state{ text-align:center; padding:60px 0; color:var(--parchment-dim); }
.loading{ text-align:center; padding:60px 0; color:var(--gold); }

/* ============ CARD LAYOUT (بلوك لكل حجز بدل سطر) ============ */
.bookings-grid{
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  gap:20px;
}
.booking-card{
  background:var(--card); border:1px solid var(--bronze-line); border-radius:10px; padding:22px;
  display:flex; flex-direction:column; gap:16px;
}
.bc-head{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap; }
.bc-head .order-id{ font-family:'Aref Ruqaa',serif; font-size:19px; color:var(--ivory); }
.bc-head .order-date{ font-size:12px; color:var(--parchment-dim); margin-top:2px; }

.bc-section{ border-top:1px solid var(--bronze-line); padding-top:14px; }
.bc-section:first-of-type{ border-top:none; padding-top:0; }
.bc-label{ font-size:11px; color:var(--parchment-dim); margin-bottom:4px; text-transform:uppercase; letter-spacing:.03em; }
.bc-value{ font-size:14.5px; color:var(--ivory); font-weight:600; line-height:1.6; }

.bc-grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }

.bc-items{ background:var(--espresso-2); border:1px solid var(--bronze-line); border-radius:8px; padding:12px 14px; font-size:13px; line-height:2; color:var(--parchment); }

.bc-totals{ display:flex; justify-content:space-between; gap:10px; flex-wrap:wrap; font-size:13.5px; }
.bc-totals .grand{ color:var(--gold-bright); font-weight:700; font-size:16px; }

.bc-payment{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
.proof-link-btn{
  padding:8px 16px; border-radius:999px; border:1px solid var(--gold-dim); background:transparent; color:var(--gold-bright);
  font-size:12.5px; font-weight:700; text-decoration:none; white-space:nowrap;
}
.proof-link-btn:hover{ background:rgba(217,172,84,.1); }

/* teronex + footer */
.teronex-badge{
  display:inline-flex; align-items:center; justify-content:center; position:relative; padding:8px 20px 8px 16px;
  background:linear-gradient(135deg,#1a110c,#2c1d0e); border:1px solid var(--gold-dim); color:var(--gold-bright);
  font-family:'Tajawal',sans-serif; font-weight:700; font-size:13px; letter-spacing:.08em; text-decoration:none;
  transition:all .4s cubic-bezier(.22,.85,.32,1); box-shadow:0 0 20px rgba(201,162,75,.08); overflow:hidden; cursor:pointer;
}
.teronex-badge-inner{ display:flex; align-items:center; gap:10px; position:relative; z-index:2; }
.teronex-logo{ width:22px; height:22px; stroke:var(--gold); transition:transform .6s cubic-bezier(.22,.85,.32,1); }
.teronex-text{
  color:var(--ivory); font-weight:900; font-size:14px;
  background:linear-gradient(90deg,var(--gold-bright),var(--gold),var(--gold-dim));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:.12em;
}
.teronex-shine{
  position:absolute; inset:0; z-index:1; pointer-events:none;
  background:linear-gradient(120deg, transparent 20%, rgba(217,172,84,.12) 40%, rgba(217,172,84,.25) 50%, rgba(217,172,84,.12) 60%, transparent 80%);
  background-size:200% 100%; animation:teronexShine 4.5s ease-in-out infinite; opacity:0; transition:opacity .6s ease;
}
.teronex-badge:hover .teronex-shine{ opacity:1; }
@keyframes teronexShine{ 0%{background-position:-200% 0;} 100%{background-position:200% 0;} }
.teronex-badge:hover{ transform:translateY(-2px); box-shadow:0 8px 30px rgba(201,162,75,.25); border-color:var(--gold); }
.teronex-badge:hover .teronex-logo{ transform:rotate(15deg) scale(1.1); }
@media (max-width:640px){ .teronex-badge{ padding:6px 14px 6px 12px; font-size:11px; } .teronex-logo{ width:18px; height:18px; } .teronex-text{ font-size:12px; } }

footer{ flex-shrink:0; padding:30px 0 20px; border-top:1px solid var(--bronze-line); margin-top:auto; background:var(--void); }
.footer-bottom{ display:flex; justify-content:space-between; flex-wrap:wrap; gap:10px; font-size:12.5px; color:var(--parchment-dim); align-items:center; }

@media (max-width:480px){
  .bc-grid-2{ grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div class="page-wrapper">

  <!-- ===================== LOGIN ===================== -->
  <div class="login-wrap" id="loginWrap">
    <div class="login-box">
      <h2>لوحة حجوزات سلطان البن</h2>
      <input type="text" id="loginUser" placeholder="اسم المستخدم">
      <input type="password" id="loginPass" placeholder="كلمة المرور">
      <button id="loginBtn">دخول</button>
      <div class="login-error" id="loginError">اسم المستخدم أو كلمة المرور غير صحيحة</div>
    </div>
  </div>

  <!-- ===================== DASHBOARD ===================== -->
  <div id="dashWrap" style="display:none;">
    <div class="dash-header">
      <div class="container" style="display:flex; justify-content:space-between; align-items:center; width:100%; flex-wrap:wrap; gap:12px;">
        <div class="brand">لوحة الحجوزات — سلطان البن</div>
        <div class="dash-actions">
          <button id="refreshBtn">تحديث ⟳</button>
          <a href="index.html">الموقع الرئيسي</a>
          <button id="logoutBtn">خروج</button>
        </div>
      </div>
    </div>

    <div class="dash-body">
      <div class="container">
        <div class="stats-row" id="statsRow"></div>

        <div class="toolbar">
          <div class="search-box">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="ابحث بالاسم، رقم الهاتف، المحافظة، أو رقم الطلب...">
          </div>
        </div>

        <div class="count-hint" id="countHint"></div>

        <div id="bookingsWrap">
          <div class="loading">جاري تحميل الحجوزات...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===================== FOOTER ===================== -->
  <footer>
    <div class="container">
      <div class="footer-bottom">
        <span>© 2026 جميع الحقوق محفوظة لسلطان البن</span>
        <a href="https://teronex-tech.github.io/Teronex/" target="_blank" rel="noopener" class="teronex-badge" aria-label="Teronex – تطوير و تصميم">
          <span class="teronex-badge-inner">
            <svg class="teronex-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12h4l2-6 4 12 2-6 4 6 2-6h4" />
              <path d="M3 18h18" />
            </svg>
            <span class="teronex-text"> تطوير و تصميم TERONEX</span>
          </span>
          <span class="teronex-shine"></span>
        </a>
      </div>
    </div>
  </footer>

</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw9Tdqo3QmCDyOxWdKWbQCtxrk5RuvFLJ6FyjCWNOanE_tztfCcsfxC7GlQuRVRj4hTlQ/exec";
const ADMIN_USER = "admin";
const ADMIN_PASS = "coffee2026";

const loginWrap = document.getElementById('loginWrap');
const dashWrap = document.getElementById('dashWrap');

let allRows = [];
let searchTerm = '';

function tryLogin(){
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value.trim();
  if (u === ADMIN_USER && p === ADMIN_PASS){
    sessionStorage.setItem('sb_admin_ok', '1');
    loginWrap.style.display = 'none';
    dashWrap.style.display = 'flex';
    loadBookings();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
document.getElementById('loginBtn').addEventListener('click', tryLogin);
document.getElementById('loginPass').addEventListener('keydown', (e) => { if (e.key === 'Enter') tryLogin(); });

document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem('sb_admin_ok');
  location.reload();
});
document.getElementById('refreshBtn').addEventListener('click', loadBookings);

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchTerm = e.target.value.trim().toLowerCase();
  applyFilters();
});

async function loadBookings(){
  const wrap = document.getElementById('bookingsWrap');
  wrap.innerHTML = '<div class="loading">جاري تحميل الحجوزات...</div>';

  try {
    const res = await fetch(`${SCRIPT_URL}?action=list&pass=${encodeURIComponent(ADMIN_PASS)}`);
    const data = await res.json();
    if (data.status !== 'ok') throw new Error(data.message || 'خطأ غير معروف');
    allRows = data.rows;
    renderStats(allRows);
    applyFilters();
  } catch (err){
    wrap.innerHTML = `<div class="empty-state">تعذّر تحميل البيانات: ${err.message}</div>`;
  }
}

function renderStats(rows){
  const wrap = document.getElementById('statsRow');
  const totalOrders = rows.length;
  const totalRevenue = rows.reduce((s, r) => s + (Number(r['الإجمالي الكلي']) || 0), 0);
  const today = new Date().toDateString();
  const todayOrders = rows.filter(r => new Date(r['التاريخ والوقت']).toDateString() === today).length;

  wrap.innerHTML = `
    <div class="stat-card"><div class="num">${totalOrders}</div><div class="label">إجمالي الحجوزات</div></div>
    <div class="stat-card"><div class="num">${todayOrders}</div><div class="label">حجوزات اليوم</div></div>
    <div class="stat-card"><div class="num">${totalRevenue.toLocaleString('ar-EG')} ج.م</div><div class="label">إجمالي القيمة</div></div>
  `;
}

function applyFilters(){
  let rows = allRows;
  if (searchTerm){
    rows = rows.filter(r => {
      const hay = [r['الاسم'], r['رقم الهاتف 1'], r['رقم الهاتف 2'], r['المحافظة'], r['رقم الطلب']]
        .join(' ').toLowerCase();
      return hay.includes(searchTerm);
    });
  }
  document.getElementById('countHint').textContent = `عرض ${rows.length} من ${allRows.length} حجز`;
  renderCards(rows);
}

function renderCards(rows){
  const wrap = document.getElementById('bookingsWrap');
  if (!rows.length){
    wrap.innerHTML = '<div class="empty-state">لا توجد حجوزات مطابقة</div>';
    return;
  }

  wrap.innerHTML = `<div class="bookings-grid">${rows.map(cardHtml).join('')}</div>`;
}

function cardHtml(r){
  const date = r['التاريخ والوقت'] ? new Date(r['التاريخ والوقت']).toLocaleString('ar-EG') : '';
  const orderId = r['رقم الطلب'] || '';
  const itemsHtml = (r['الأصناف'] || '').split(' | ').filter(Boolean).map(i => `<div>• ${i}</div>`).join('') || 'لا توجد أصناف مسجّلة';
  const proofHtml = r['رابط إثبات الدفع']
    ? `<a class="proof-link-btn" href="${r['رابط إثبات الدفع']}" target="_blank">عرض إثبات الدفع 🧾</a>`
    : `<span style="font-size:12.5px; color:var(--parchment-dim);">لا توجد صورة إثبات</span>`;

  return `
    <div class="booking-card">
      <div class="bc-head">
        <div>
          <div class="order-id">${orderId}</div>
          <div class="order-date">${date}</div>
        </div>
      </div>

      <div class="bc-section">
        <div class="bc-grid-2">
          <div>
            <div class="bc-label">الاسم</div>
            <div class="bc-value">${r['الاسم'] || '—'}</div>
          </div>
          <div>
            <div class="bc-label">المحافظة</div>
            <div class="bc-value">${r['المحافظة'] || '—'}</div>
          </div>
          <div>
            <div class="bc-label">رقم الهاتف 1</div>
            <div class="bc-value">${r['رقم الهاتف 1'] || '—'}</div>
          </div>
          <div>
            <div class="bc-label">رقم الهاتف 2</div>
            <div class="bc-value">${r['رقم الهاتف 2'] || '—'}</div>
          </div>
        </div>
      </div>

      <div class="bc-section">
        <div class="bc-label">العنوان</div>
        <div class="bc-value">${r['العنوان'] || '—'}</div>
      </div>

      <div class="bc-section">
        <div class="bc-label">الأصناف</div>
        <div class="bc-items">${itemsHtml}</div>
      </div>

      <div class="bc-section">
        <div class="bc-totals">
          <span>الفرعي: ${r['الإجمالي الفرعي'] || 0} ج.م</span>
          <span>الشحن: ${r['الشحن'] || 0} ج.م</span>
          <span class="grand">الإجمالي: ${r['الإجمالي الكلي'] || 0} ج.م</span>
        </div>
      </div>

      <div class="bc-section">
        <div class="bc-payment">
          <div>
            <div class="bc-label">طريقة الدفع</div>
            <div class="bc-value">${r['طريقة الدفع'] || '—'}</div>
          </div>
          ${proofHtml}
        </div>
      </div>
    </div>
  `;
}


/* keep session across refresh */
if (sessionStorage.getItem('sb_admin_ok') === '1'){
  loginWrap.style.display = 'none';
  dashWrap.style.display = 'flex';
  loadBookings();
}
</script>
</body>
</html>
